apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apache-child             # Child app name
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.email: "romanticangel512@gmail.com"
    notifications.argoproj.io/subscribe.on-health-degraded.email: "romanticangel512@gmail.com"
    notifications.argoproj.io/subscribe.on-sync-succeeded.email: "romanticangel512@gmail.com"
    notifications.argoproj.io/subscribe.on-out-of-sync.email: "romanticangel512@gmail.com"
spec:
  project: default
  source:
    repoURL: https://github.com/muhammadali792/argocd-demos.git # Repo containing child apps(that you have forked and cloned earlier)
    targetRevision: main
    path: cli_approach/apache    # path of Apache app in `argocd-demos` repo
  destination:
    server: https://172.31.40.251:6443 # Replace with your Cluster Url, To get run: `argocd cluster list`
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
